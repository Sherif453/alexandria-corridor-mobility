name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./dev.db
      TOMTOM_API_KEY: ""
      ADMIN_REFRESH_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Prepare temp directory
        run: mkdir -p .tmp

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed corridor
        run: npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Check Python syntax
        run: python -m py_compile python/features/build_features.py python/models/train_baseline.py python/models/generate_predictions.py python/simulation/run_sumo_scenarios.py

      - name: Build
        run: npm run build
